services:
  mysql:
    image: mysql:8.0
    container_name: zhibo-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zhibo
      MYSQL_USER: zhibo
      MYSQL_PASSWORD: zhibo
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zhibo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  srs:
    image: ossrs/srs:5
    container_name: zhibo-srs
    ports:
      - "1935:1935"   # RTMP 推流
      - "8080:8080"   # HLS / HTTP-FLV 拉流
    volumes:
      - ./deploy/srs.conf:/usr/local/srs/conf/srs.conf:ro
    command: ["./objs/srs", "-c", "conf/srs.conf"]

volumes:
  mysql_data:
  redis_data:
