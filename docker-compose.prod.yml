services:
  mysql:
    image: mysql:8.0
    container_name: zhibo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zhibo}
      MYSQL_USER: ${MYSQL_USER:-zhibo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zhibo}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: zhibo-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Kafka（Redpanda 单节点，WS 跨实例广播）
  # 国内 ECS 拉取失败：bash scripts/pull-kafka-image.sh 或 SKIP_KAFKA=1 redeploy
  kafka:
    image: ${KAFKA_IMAGE:-docker.redpanda.com/redpandadata/redpanda:v24.2.4}
    container_name: zhibo-kafka
    hostname: kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--exit-code-on-error"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zhibo-backend
    restart: unless-stopped
    environment: &backend_env
      PORT: 8081
      MYSQL_DSN: ${MYSQL_DSN:-zhibo:zhibo@tcp(mysql:3306)/zhibo?charset=utf8mb4&parseTime=True&loc=Local}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      FRONTEND_URL: ${FRONTEND_URL:-http://47.97.176.185}
      FRONTEND_URLS: ${FRONTEND_URLS:-http://47.97.176.185}
      JWT_SECRET: ${JWT_SECRET:-please-change-me}
      PAY_TIMEOUT_MINUTES: ${PAY_TIMEOUT_MINUTES:-30}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_BASE: ${AI_API_BASE:-https://api.moonshot.cn/v1}
      AI_MODEL: ${AI_MODEL:-moonshot-v1-8k}
      AI_TTS_MODEL: ${AI_TTS_MODEL:-tts-1}
      AI_TTS_VOICE: ${AI_TTS_VOICE:-nova}
      UPLOAD_DIR: /app/uploads
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-zhibo.room.broadcast}
      INSTANCE_ID: backend-1
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # 第二 API/WS 实例：Kafka 跨节点房间广播（见 docs/scaling.md）
  backend-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zhibo-backend-2
    restart: unless-stopped
    environment:
      <<: *backend_env
      INSTANCE_ID: backend-2
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zhibo-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: zhibo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - backend-2
      - grafana

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: zhibo-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: zhibo-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: zhibo
      GF_USERS_ALLOW_SIGN_UP: "false"
      # 经 Nginx /monitor/ 反代访问（与 GRAFANA_ROOT_URL 一致，含末尾 /）
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://47.97.176.185/monitor/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  prometheus_data:
  grafana_data:
