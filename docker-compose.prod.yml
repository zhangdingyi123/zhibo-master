services:
  mysql:
    image: mysql:8.0
    container_name: zhibo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zhibo}
      MYSQL_USER: ${MYSQL_USER:-zhibo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zhibo}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: zhibo-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zhibo-backend
    restart: unless-stopped
    environment:
      PORT: 8081
      MYSQL_DSN: ${MYSQL_DSN:-zhibo:zhibo@tcp(mysql:3306)/zhibo?charset=utf8mb4&parseTime=True&loc=Local}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      FRONTEND_URL: ${FRONTEND_URL:-https://jj520.xyz}
      FRONTEND_URLS: ${FRONTEND_URLS:-https://jj520.xyz,https://mgongchang.xyz}
      JWT_SECRET: ${JWT_SECRET:-please-change-me}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zhibo-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: zhibo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
  redis_data:
