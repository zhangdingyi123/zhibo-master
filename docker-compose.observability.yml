# 可观测性栈：Prometheus + Grafana
# 推荐：bash scripts/observability-up.sh
# 或手动（ECS 多为 docker-compose 带连字符）：
#   docker-compose -f docker-compose.prod.yml -f docker-compose.observability.yml up -d
# Grafana: http://<ECS公网IP>:3000  (admin / zhibo)
# Prometheus: http://<ECS公网IP>:9090

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: zhibo-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.2.0
    container_name: zhibo-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: zhibo
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
