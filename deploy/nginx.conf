# IP 直访（免备案）：http://<ECS公网IP>/app 、/admin 、/monitor/

upstream zhibo_backend {
    server zhibo-backend:8081;
}

server {
    listen 80 default_server;
    server_name _;

    location = / {
        return 302 /app;
    }

    location /uploads/ {
        proxy_pass http://zhibo_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://zhibo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Prometheus 指标（backend 暴露；Prometheus 容器内直连 zhibo-backend:8081）
    location = /metrics {
        proxy_pass http://zhibo_backend;
        proxy_set_header Host $host;
    }

    # Grafana 监控大盘（免开 3000 端口，走 80 即可）
    location = /monitor {
        return 302 /monitor/;
    }

    location /monitor/ {
        proxy_pass http://zhibo-grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://zhibo-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
