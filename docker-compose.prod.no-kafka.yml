# 国内 ECS 无法拉取 Redpanda 时使用（兼容 docker-compose v1）：
#   SKIP_KAFKA=1 bash scripts/redeploy.sh
# 或：docker-compose -f docker-compose.prod.yml -f docker-compose.prod.no-kafka.yml up -d --build
#
# 用 alpine stub 满足 depends_on/healthcheck；backend 清空 KAFKA_BROKERS → Redis Pub/Sub 广播
services:
  kafka:
    image: alpine:3.20
    container_name: zhibo-kafka
    hostname: kafka
    restart: unless-stopped
    command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 5s
      timeout: 3s
      retries: 1
      start_period: 1s

  backend:
    environment:
      KAFKA_BROKERS: ""

  backend-2:
    environment:
      KAFKA_BROKERS: ""
